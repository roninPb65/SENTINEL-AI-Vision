<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL AI — Live Object Detection</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:      #080c10;
    --panel:   #0d1117;
    --border:  #1a2332;
    --accent:  #00ff88;
    --accent2: #00b8ff;
    --warn:    #ff4444;
    --text:    #c9d1d9;
    --muted:   #4a5568;
    --mono:    'Share Tech Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    background: var(--panel); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: var(--mono); font-size: 1.1rem; letter-spacing: .2em; color: var(--accent); display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); animation: blink 1.4s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  .header-right { display: flex; align-items: center; gap: 16px; font-family: var(--mono); font-size: .75rem; color: var(--muted); }
  #clock { color: var(--accent2); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 53px); }

  /* VIDEO PANEL */
  .video-panel { position: relative; background: #000; overflow: hidden; border-right: 1px solid var(--border); }

  /* video NOT mirrored — we flip canvas manually so labels stay readable */
  #videoEl  { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
  #canvasEl { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px); pointer-events: none; z-index: 2; }
  .corner { position: absolute; width: 22px; height: 22px; z-index: 3; }
  .corner.tl { top:14px; left:14px; border-top:2px solid var(--accent); border-left:2px solid var(--accent); }
  .corner.tr { top:14px; right:14px; border-top:2px solid var(--accent); border-right:2px solid var(--accent); }
  .corner.bl { bottom:14px; left:14px; border-bottom:2px solid var(--accent); border-left:2px solid var(--accent); }
  .corner.br { bottom:14px; right:14px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); }

  .video-hud { position: absolute; top:14px; right:50px; display:flex; gap:8px; z-index:4; }
  .hud-chip { font-family:var(--mono); font-size:.68rem; background:rgba(0,0,0,.85); border:1px solid var(--border); padding:3px 10px; color:var(--accent2); }
  .video-status { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:.68rem; color:var(--accent); background:rgba(0,0,0,.8); padding:4px 14px; border:1px solid var(--accent); letter-spacing:.1em; z-index:4; white-space:nowrap; }

  /* IDLE */
  #idle { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--panel); gap:14px; }
  .idle-icon { font-size:2.8rem; opacity:.35; }
  #idle p { font-family:var(--mono); font-size:.8rem; color:var(--muted); letter-spacing:.05em; text-align:center; padding:0 20px; }
  .progress-wrap { width:260px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-bar { height:100%; background:var(--accent); width:0%; transition:width .3s; }
  @keyframes pp { 0%,100%{opacity:1} 50%{opacity:.4} }
  .progress-bar.pulsing { animation: pp 1.6s ease infinite; }

  #startBtn { font-family:var(--mono); font-size:.82rem; letter-spacing:.15em; background:transparent; color:var(--accent); border:1px solid var(--accent); padding:10px 32px; cursor:pointer; transition:background .2s,color .2s; text-transform:uppercase; margin-top:4px; }
  #startBtn:hover:not(:disabled) { background:var(--accent); color:#000; }
  #startBtn:disabled { opacity:.35; cursor:not-allowed; }

  /* SIDEBAR */
  .sidebar { display:flex; flex-direction:column; background:var(--panel); overflow:hidden; }
  .sidebar-section { border-bottom:1px solid var(--border); padding:12px 14px; }
  .sidebar-title { font-family:var(--mono); font-size:.62rem; letter-spacing:.18em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }

  #detectionList { display:flex; flex-direction:column; gap:5px; max-height:210px; overflow-y:auto; }
  .det-item { padding:6px 8px; background:rgba(0,255,136,.04); border:1px solid rgba(0,255,136,.12); animation:fadeIn .15s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
  .det-row { display:flex; justify-content:space-between; margin-bottom:4px; }
  .det-label { font-family:var(--mono); font-size:.75rem; color:var(--accent); text-transform:uppercase; }
  .det-conf  { font-family:var(--mono); font-size:.72rem; color:var(--accent2); }
  .det-bar-wrap { width:100%; height:2px; background:var(--border); }
  .det-bar { height:100%; background:var(--accent); transition:width .25s; }
  .no-det { font-family:var(--mono); font-size:.73rem; color:var(--muted); text-align:center; padding:10px 0; }

  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  .stat-box { background:rgba(0,184,255,.04); border:1px solid var(--border); padding:7px 9px; }
  .stat-val { font-family:var(--mono); font-size:1.2rem; color:var(--accent2); line-height:1; }
  .stat-lbl { font-size:.6rem; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.1em; }

  .ctrl-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
  .ctrl-row label { font-family:var(--mono); font-size:.7rem; color:var(--muted); }
  .ctrl-row span  { font-family:var(--mono); font-size:.7rem; color:var(--accent); font-weight:600; }
  input[type=range] { width:100%; accent-color:var(--accent); height:3px; cursor:pointer; }

  /* model quality toggle */
  .toggle-row { display:flex; gap:6px; margin-top:10px; }
  .tog-btn { flex:1; font-family:var(--mono); font-size:.65rem; letter-spacing:.08em; text-transform:uppercase; padding:5px 4px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; transition:all .2s; }
  .tog-btn.active { border-color:var(--accent2); color:var(--accent2); background:rgba(0,184,255,.08); }

  .log-wrap { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:3px; }
  .log-item { font-family:var(--mono); font-size:.65rem; color:var(--muted); line-height:1.5; padding:2px 0; border-bottom:1px solid rgba(255,255,255,.03); }
  .log-item .ts { color:var(--accent2); margin-right:6px; }
  .log-item b { color:var(--accent); font-weight:400; }

  ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:var(--border); }

  @media (max-width:768px) { .layout { grid-template-columns:1fr; grid-template-rows:55vh 1fr; height:auto; } }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>SENTINEL AI</div>
  <div class="header-right">
    <span id="modelLabel">COCO-SSD · TF.js</span>
    <span id="clock">--:--:--</span>
  </div>
</header>

<div class="layout">

  <div class="video-panel">
    <video id="videoEl" autoplay muted playsinline></video>
    <canvas id="canvasEl"></canvas>
    <div class="scanlines"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="video-hud">
      <div class="hud-chip" id="fpsChip">FPS: --</div>
      <div class="hud-chip" id="objChip">OBJ: 0</div>
    </div>
    <div class="video-status" id="videoStatus">CAMERA OFFLINE</div>

    <div id="idle">
      <div class="idle-icon">🎯</div>
      <p>SENTINEL AI SURVEILLANCE SYSTEM</p>
      <p id="modelStatus">Initialising neural network…</p>
      <div class="progress-wrap"><div class="progress-bar pulsing" id="progressBar"></div></div>
      <button id="startBtn" disabled>ACTIVATE CAMERA</button>
    </div>
  </div>

  <div class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-title">Live Detections</div>
      <div id="detectionList"><div class="no-det">— awaiting feed —</div></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Session Stats</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Total detections</div></div>
        <div class="stat-box"><div class="stat-val" id="sClasses">0</div><div class="stat-lbl">Classes seen</div></div>
        <div class="stat-box"><div class="stat-val" id="sFrames">0</div><div class="stat-lbl">Frames analysed</div></div>
        <div class="stat-box"><div class="stat-val" id="sPeak">0</div><div class="stat-lbl">Peak / frame</div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Controls</div>
      <div class="ctrl-row"><label>Confidence threshold</label><span id="confVal">40%</span></div>
      <input type="range" id="confRange" min="10" max="90" value="40">
      <div class="ctrl-row" style="margin-top:12px;margin-bottom:4px"><label>Detection model</label></div>
      <div class="toggle-row">
        <button class="tog-btn" id="btnFast">⚡ Fast</button>
        <button class="tog-btn active" id="btnAccurate">🎯 Accurate</button>
      </div>
    </div>

    <div class="sidebar-title" style="padding:12px 14px 2px">Event Log</div>
    <div class="log-wrap" id="logList"></div>
  </div>
</div>

<script>
// ── PALETTE ────────────────────────────────────────────────────────────────
const PALETTE = ['#00ff88','#00b8ff','#ff4444','#ffbb00','#cc44ff','#ff8800','#44ffff','#ff44aa','#88ff00','#4488ff'];
const _cc = {};
function classColor(label) {
  if (!_cc[label]) {
    let h = 0;
    for (let i = 0; i < label.length; i++) h = label.charCodeAt(i) + ((h << 5) - h);
    _cc[label] = PALETTE[Math.abs(h) % PALETTE.length];
  }
  return _cc[label];
}

// ── DOM ────────────────────────────────────────────────────────────────────
const videoEl    = document.getElementById('videoEl');
const canvasEl   = document.getElementById('canvasEl');
const ctx        = canvasEl.getContext('2d');
const startBtn   = document.getElementById('startBtn');
const idleDiv    = document.getElementById('idle');
const modelStatus= document.getElementById('modelStatus');
const progressBar= document.getElementById('progressBar');
const detList    = document.getElementById('detectionList');
const logList    = document.getElementById('logList');
const confRange  = document.getElementById('confRange');
const confVal    = document.getElementById('confVal');
const fpsChip    = document.getElementById('fpsChip');
const objChip    = document.getElementById('objChip');
const videoStatus= document.getElementById('videoStatus');
const btnFast    = document.getElementById('btnFast');
const btnAccurate= document.getElementById('btnAccurate');

// ── CLOCK ──────────────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', { hour12: false });
}, 1000);

// ── CONFIDENCE ─────────────────────────────────────────────────────────────
let CONF = 0.40;
confRange.addEventListener('input', () => {
  CONF = confRange.value / 100;
  confVal.textContent = confRange.value + '%';
});

// ── STATS ──────────────────────────────────────────────────────────────────
let totalDets = 0, frames = 0, peak = 0;
const classSet = new Set();
function updateStats(count, labels) {
  frames++; totalDets += count;
  if (count > peak) peak = count;
  labels.forEach(l => classSet.add(l));
  document.getElementById('sTotal').textContent   = totalDets;
  document.getElementById('sClasses').textContent = classSet.size;
  document.getElementById('sFrames').textContent  = frames;
  document.getElementById('sPeak').textContent    = peak;
}

// ── LOG ────────────────────────────────────────────────────────────────────
function log(html) {
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const el = document.createElement('div');
  el.className = 'log-item';
  el.innerHTML = `<span class="ts">${ts}</span>${html}`;
  logList.prepend(el);
  while (logList.children.length > 100) logList.lastChild.remove();
}

// ── DRAW ─────────────────────────────────────────────────────────────────
// Video is CSS-mirrored (scaleX -1). Canvas is NOT CSS-mirrored.
// We flip the canvas coordinate system so boxes align with the mirrored video,
// then draw text unflipped so labels stay readable.
function draw(predictions, vw, vh) {
  canvasEl.width = vw;
  canvasEl.height = vh;
  ctx.clearRect(0, 0, vw, vh);

  for (const p of predictions) {
    if (p.score < CONF) continue;

    // Mirror the x coordinate to match the CSS-flipped video
    const [rx, y, w, h] = p.bbox;
    const x = vw - rx - w; // flipped x

    const color = classColor(p.class);
    const label = `${p.class.toUpperCase()}  ${(p.score * 100).toFixed(0)}%`;

    // Filled box
    ctx.fillStyle = color + '1a';
    ctx.fillRect(x, y, w, h);

    // Box stroke
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    // Corner accents
    const cs = 12;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y+cs);     ctx.lineTo(x, y);      ctx.lineTo(x+cs, y);
    ctx.moveTo(x+w-cs, y);   ctx.lineTo(x+w, y);    ctx.lineTo(x+w, y+cs);
    ctx.moveTo(x+w, y+h-cs); ctx.lineTo(x+w, y+h);  ctx.lineTo(x+w-cs, y+h);
    ctx.moveTo(x+cs, y+h);   ctx.lineTo(x, y+h);    ctx.lineTo(x, y+h-cs);
    ctx.stroke();

    // Label (readable — no flip needed since canvas is not transformed)
    ctx.font = 'bold 12px "Share Tech Mono", monospace';
    const tw = ctx.measureText(label).width + 12;
    const lh = 20;
    ctx.fillStyle = color;
    ctx.fillRect(x, y - lh, tw, lh);
    ctx.fillStyle = '#000';
    ctx.fillText(label, x + 6, y - 5);
  }
}

// ── SIDEBAR DETECTIONS ────────────────────────────────────────────────────
const seenClasses = new Set();
function updateSidebar(predictions) {
  const vis = predictions.filter(p => p.score >= CONF);
  if (!vis.length) {
    detList.innerHTML = '<div class="no-det">— no objects detected —</div>';
    return;
  }
  const agg = {};
  for (const p of vis) {
    if (!agg[p.class] || p.score > agg[p.class]) agg[p.class] = p.score;
    if (!seenClasses.has(p.class)) {
      log(`Identified: <b>${p.class.toUpperCase()}</b>`);
      seenClasses.add(p.class);
    }
  }
  detList.innerHTML = Object.entries(agg)
    .sort((a,b) => b[1]-a[1])
    .map(([cls, score]) => {
      const pct = (score*100).toFixed(1);
      return `<div class="det-item">
        <div class="det-row"><span class="det-label">${cls}</span><span class="det-conf">${pct}%</span></div>
        <div class="det-bar-wrap"><div class="det-bar" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
}

// ── MODEL LOADING ─────────────────────────────────────────────────────────
let model = null;
let currentBase = 'mobilenet_v2'; // accurate by default
let loadingModel = false;

async function loadModel(base) {
  if (loadingModel) return;
  loadingModel = true;
  model = null;

  progressBar.style.width = '0%';
  progressBar.classList.add('pulsing');
  modelStatus.textContent = base === 'mobilenet_v2'
    ? 'Loading MobileNetV2 (accurate)…'
    : 'Loading Lite MobileNetV2 (fast)…';
  startBtn.disabled = true;

  let p = 0;
  const ticker = setInterval(() => {
    p = Math.min(p + Math.random() * 9, 90);
    progressBar.style.width = p + '%';
  }, 200);

  try {
    await tf.ready();
    model = await cocoSsd.load({ base });
    clearInterval(ticker);
    progressBar.classList.remove('pulsing');
    progressBar.style.width = '100%';
    modelStatus.textContent = base === 'mobilenet_v2'
      ? 'MobileNetV2 ready — high accuracy ✓'
      : 'Lite model ready — high speed ✓';
    document.getElementById('modelLabel').textContent =
      (base === 'mobilenet_v2' ? 'MobileNetV2' : 'LiteMobileNet') + ' · TF.js';
    startBtn.disabled = false;
    log(`Model loaded: <b>${base === 'mobilenet_v2' ? 'MobileNetV2 (Accurate)' : 'Lite MobileNetV2 (Fast)'}</b>`);
    if (!idleDiv.style.display || idleDiv.style.display !== 'none') {
      log('Press ACTIVATE CAMERA to begin');
    }
  } catch (err) {
    clearInterval(ticker);
    progressBar.style.background = 'var(--warn)';
    progressBar.style.width = '100%';
    modelStatus.textContent = 'Load error: ' + err.message;
    log('ERROR: ' + err.message);
  }
  loadingModel = false;
}

// ── MODEL TOGGLE ──────────────────────────────────────────────────────────
btnFast.addEventListener('click', async () => {
  if (currentBase === 'lite_mobilenet_v2') return;
  currentBase = 'lite_mobilenet_v2';
  btnFast.classList.add('active'); btnAccurate.classList.remove('active');
  await loadModel(currentBase);
});
btnAccurate.addEventListener('click', async () => {
  if (currentBase === 'mobilenet_v2') return;
  currentBase = 'mobilenet_v2';
  btnAccurate.classList.add('active'); btnFast.classList.remove('active');
  await loadModel(currentBase);
});

// ── INFERENCE LOOP ────────────────────────────────────────────────────────
let running = false;
let lastFpsTime = performance.now(), fpsCount = 0;

async function detect() {
  if (!running || !model) return;

  let predictions = [];
  try {
    predictions = await model.detect(videoEl);
  } catch(_) {}

  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  if (vw && vh) {
    draw(predictions, vw, vh);
    updateSidebar(predictions);
    const vis = predictions.filter(p => p.score >= CONF);
    updateStats(vis.length, vis.map(p => p.class));
    objChip.textContent = `OBJ: ${vis.length}`;
  }

  fpsCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsChip.textContent = `FPS: ${Math.round(fpsCount * 1000 / (now - lastFpsTime))}`;
    fpsCount = 0; lastFpsTime = now;
  }

  requestAnimationFrame(detect);
}

// ── START CAMERA ──────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    videoEl.srcObject = stream;
    await videoEl.play();
    idleDiv.style.display = 'none';
    running = true;
    videoStatus.textContent = '● LIVE — ANALYSING';
    log('Camera stream active');
    log('Real-time detection running');
    detect();
  } catch (err) {
    startBtn.disabled = false;
    modelStatus.textContent = 'Camera access denied';
    log('Camera error: ' + err.message);
  }
});

// ── BOOT ──────────────────────────────────────────────────────────────────
log('System boot — SENTINEL AI v2.1');
loadModel(currentBase);
</script>
</body>
</html>
